version: "3.8"

services:
  # ===== GREMIO ESTELAR — LOCAL TESTING WITH DOCKER =====
  # This compose file is for LOCAL TESTING only.
  # For production deployment, use Render.com (see README).
  # ======================================================

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-runner
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:4000/api
    container_name: gremio-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gremio-backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - FRONTEND_URL=http://localhost:3000
      # Requiere DATABASE_URL en tu .env (ej: tu connection string de Neon)
      - DATABASE_URL=${DATABASE_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-dev-access-secret}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-refresh-secret}
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
