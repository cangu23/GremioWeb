version: "3.8"

services:
  # ===== BASE DE DATOS (PostgreSQL) =====
  postgres:
    image: postgres:15-alpine
    container_name: gremio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gremioweb}
      POSTGRES_USER: ${POSTGRES_USER:-gremio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Error: POSTGRES_PASSWORD is required in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gremio-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gremio_user} -d ${POSTGRES_DB:-gremioweb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===== SERVICIO MEDIA ENGINE (Python) =====
  media-engine:
    build:
      context: ./media-engine
      dockerfile: Dockerfile
    container_name: gremio-media-engine
    restart: unless-stopped
    environment:
      - PORT=8001
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY:-}
      - R2_SECRET_KEY=${R2_SECRET_KEY:-}
      - R2_BUCKET=${R2_BUCKET:-gremio-estelar-media}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
    networks:
      - gremio-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ===== APLICACIÓN WEB FULLSTACK (Next.js + Express Node.js) =====
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api}
    container_name: gremio-web-app
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gremio_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gremioweb}?schema=public
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-change-this-jwt-access-secret-prod}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-this-jwt-refresh-secret-prod}
      - JWT_ACCESS_EXPIRES_IN=${JWT_ACCESS_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - MEDIA_ENGINE_URL=http://media-engine:8001
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      media-engine:
        condition: service_healthy
    networks:
      - gremio-network
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ===== CLOUDFLARE TUNNEL =====
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: gremio-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:?Error: TUNNEL_TOKEN is mandatory in .env}
    networks:
      - gremio-network
    depends_on:
      web:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

volumes:
  postgres_data:
    driver: local

networks:
  gremio-network:
    driver: bridge
